name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        run: echo "Clone the code"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: build the code
        run: echo "build the code"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: run the test cases
        run: echo "Run the test cases"
  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: deploy the code
        run: echo "Deploy the code"
